# Render blueprint for O Tracker.
# Deploy: push to a Git repo, then "New + → Blueprint" in the Render dashboard.
# Set the secret env vars (marked sync:false) in the dashboard after first deploy.
services:
  - type: web
    name: o-tracker
    runtime: node
    plan: free # free tier sleeps after ~15 min idle; switch to "starter" (~$7/mo) to keep webhooks always responsive
    # `prisma db push` creates the tables directly from schema.prisma (no migration
    # files needed) — simplest for the beta. Switch to `prisma migrate deploy` once
    # you start generating migrations (npx prisma migrate dev --name init locally).
    buildCommand: npm install && npm run build && npx prisma db push
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_URL
        sync: false # e.g. https://o-tracker.onrender.com (set to this service's URL)
      - key: DATABASE_URL
        fromDatabase:
          name: o-tracker-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: OURA_CLIENT_ID
        sync: false
      - key: OURA_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: ENCRYPTION_KEY
        sync: false # node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
      - key: DEFAULT_LANGUAGE
        value: ru
      - key: GEMINI_DAILY_QUOTA_PER_USER
        value: "8"
      - key: METRIC_CONTEXT_DAYS
        value: "7"
      - key: ALLOWED_TELEGRAM_IDS
        sync: false # invite-only allowlist; comma-separated Telegram IDs. Empty = open to all.

databases:
  - name: o-tracker-db
    plan: free # free Postgres (1 GB, expires after 30 days). Switch to "basic-256mb" (~$7/mo) for a permanent DB.
