<!DOCTYPE html>
<html lang="ru" data-theme="navy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>O Tracker</title>
<style>
  /* ===== DEFAULT THEME: DARK BLUE (navy) ===== */
  :root {
    --page:        #070d1c;   /* deep navy page plane */
    --surface-1:   #0f1a33;   /* card surface */
    --surface-2:   #14213f;
    --surface-3:   #1b2b4f;   /* chips / segmented bg */
    --text-primary:#eef3fc;
    --text-secondary:#aebbd6;
    --muted:       #6d7c9e;
    --grid:        #223256;
    --baseline:    #2c3f68;
    --border:      rgba(140,170,225,0.16);
    --series-1:    #57a5ff;   /* accent blue on navy (>=3:1) */
    --series-1-100:#152a4d;   /* faint fill */
    --series-1-200:#24467e;
    --good:        #35d07f;
    --good-ink:    #56de95;
    --warning:     #f5b83d;
    --serious:     #f2895b;
    --shadow:      0 1px 2px rgba(0,0,0,0.45), 0 8px 30px rgba(4,10,26,0.55);
    --radius:      16px;
    --glow:        0 0 0 1px rgba(87,165,255,0.10);
    --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  html[data-theme="dark"], html[data-theme="navy"] {
    --page:#070d1c; --surface-1:#0f1a33; --surface-2:#14213f; --surface-3:#1b2b4f;
    --text-primary:#eef3fc; --text-secondary:#aebbd6; --muted:#6d7c9e;
    --grid:#223256; --baseline:#2c3f68; --border:rgba(140,170,225,0.16);
    --series-1:#57a5ff; --series-1-100:#152a4d; --series-1-200:#24467e;
    --good:#35d07f; --good-ink:#56de95; --warning:#f5b83d; --serious:#f2895b;
    --shadow:0 1px 2px rgba(0,0,0,0.45), 0 8px 30px rgba(4,10,26,0.55);
  }
  /* optional light theme via toggle */
  html[data-theme="light"] {
      --page:#eef2f9; --surface-1:#ffffff; --surface-2:#f4f7fc; --surface-3:#eaf0fa;
      --text-primary:#0b1220; --text-secondary:#465372; --muted:#7a879f;
      --grid:#dbe3f0; --baseline:#c3cde0; --border:rgba(20,40,80,0.12);
      --series-1:#2a6ff0; --series-1-100:#dce8ff; --series-1-200:#9bc0ff;
      --good:#0a9e4a; --good-ink:#067a38; --warning:#b57d00; --serious:#c1552b;
      --shadow:0 1px 2px rgba(20,40,80,0.05), 0 6px 20px rgba(20,40,80,0.08);
  }

  * { box-sizing: border-box; }
  html, body { max-width: 100%; overflow-x: hidden; }
  body {
    margin: 0; color: var(--text-primary);
    font-family: var(--font); font-size: 15px; line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(1100px 600px at 78% -8%, rgba(87,165,255,0.14), transparent 60%),
      radial-gradient(900px 520px at 8% 4%, rgba(46,92,180,0.12), transparent 55%),
      var(--page);
    background-attachment: fixed;
    min-height: 100vh;
  }
  html[data-theme="light"] body {
    background:
      radial-gradient(1000px 560px at 80% -10%, rgba(42,111,240,0.10), transparent 60%),
      var(--page);
    background-attachment: fixed;
  }
  a { color: var(--series-1); }

  /* ---- top bar ---- */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in srgb, var(--page) 82%, transparent);
    backdrop-filter: saturate(160%) blur(12px);
    -webkit-backdrop-filter: saturate(160%) blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .topbar-inner {
    max-width: 940px; margin: 0 auto; padding: 12px 18px;
    display: flex; align-items: center; gap: 14px;
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 17px; letter-spacing: -0.01em; }
  .brand .mark {
    width: 26px; height: 26px; border-radius: 8px;
    background: linear-gradient(135deg, var(--series-1), var(--series-1-200));
    display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 15px;
  }
  .spacer { flex: 1; }
  .seg {
    display: inline-flex; background: var(--surface-3); border: 1px solid var(--border);
    border-radius: 10px; padding: 2px; gap: 2px;
  }
  .seg button {
    border: 0; background: transparent; color: var(--text-secondary);
    font: inherit; font-size: 13px; font-weight: 600; padding: 5px 10px;
    border-radius: 8px; cursor: pointer; transition: background .12s, color .12s;
  }
  .seg button[aria-pressed="true"] { background: var(--series-1); color: #06122b; }
  html[data-theme="light"] .seg button[aria-pressed="true"] { color: #fff; }
  .icon-btn {
    border: 1px solid var(--border); background: var(--surface-3); color: var(--text-secondary);
    width: 34px; height: 34px; border-radius: 9px; cursor: pointer; font-size: 15px;
    display: grid; place-items: center;
  }

  main { max-width: 940px; margin: 0 auto; padding: 20px 18px 60px; }

  .greeting { margin: 6px 2px 18px; }
  .greeting h1 { font-size: 22px; margin: 0 0 2px; letter-spacing: -0.02em; }
  .greeting .date { color: var(--muted); font-size: 14px; }

  .loginbar {
    display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 18px; margin-bottom: 16px;
  }
  .loginbar-txt strong { display: block; font-size: 15px; }
  .loginbar-txt span { color: var(--text-secondary); font-size: 13px; }
  .tg-login { min-height: 40px; display: flex; align-items: center; }

  /* ---- today hero ---- */
  .today {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 20px; margin-bottom: 16px;
  }
  .today-rings { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .ring-card { text-align: center; padding: 6px 4px; }
  .ring-wrap { position: relative; width: 108px; height: 108px; max-width: 100%; margin: 0 auto 6px; }
  .ring-wrap svg { width: 100%; height: 100%; display: block; }
  .ring-wrap .val {
    position: absolute; inset: 0; display: grid; place-items: center;
    font-size: 26px; font-weight: 700; letter-spacing: -0.02em;
  }
  .ring-label { font-size: 13px; color: var(--text-secondary); font-weight: 600; }
  .ring-state { font-size: 12px; margin-top: 2px; font-weight: 600; }
  .st-good { color: var(--good-ink); } .st-warn { color: var(--warning); } .st-low { color: var(--serious); }

  .insight {
    margin-top: 16px; padding: 13px 15px; border-radius: 12px;
    background: var(--surface-2); border: 1px solid var(--border);
    /* subtle navy inset */
    display: flex; gap: 11px; align-items: flex-start; font-size: 14px;
  }
  .insight .bulb {
    flex: none; width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center;
    background: var(--series-1-100); color: var(--series-1); font-size: 15px;
  }
  .insight .src { color: var(--muted); font-size: 12px; display: block; margin-top: 3px; }

  /* ---- metric grid ---- */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .card {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 18px; display: flex; flex-direction: column;
  }
  .card-head { display: flex; align-items: center; gap: 9px; margin-bottom: 12px; }
  .card-head .ic {
    width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
    background: var(--series-1-100); color: var(--series-1); font-size: 16px; flex: none;
  }
  .card-head h3 { font-size: 15px; margin: 0; font-weight: 700; letter-spacing: -0.01em; }
  .card-head .big { margin-left: auto; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
  .card-head .big small { font-size: 13px; color: var(--muted); font-weight: 600; margin-left: 2px; }

  .stats { display: flex; flex-wrap: wrap; gap: 6px 18px; margin-bottom: 12px; }
  .stat { min-width: 0; }
  .stat .k { font-size: 12px; color: var(--muted); }
  .stat .v { font-size: 15px; font-weight: 600; font-variant-numeric: tabular-nums; }

  .explain { font-size: 13px; color: var(--text-secondary); margin: 0 0 14px; }

  .trend { margin-top: auto; }
  .trend svg { display: block; width: 100%; height: 72px; overflow: visible; }
  .trend-foot { display: flex; justify-content: space-between; color: var(--muted); font-size: 11px; margin-top: 4px; }

  .tooltip {
    position: fixed; pointer-events: none; z-index: 50; opacity: 0; transform: translateY(-4px);
    transition: opacity .08s; background: var(--surface-1); color: var(--text-primary);
    border: 1px solid var(--border); box-shadow: var(--shadow); border-radius: 9px;
    padding: 7px 10px; font-size: 12px; white-space: nowrap;
  }
  .tooltip .tt-d { color: var(--muted); font-size: 11px; }
  .tooltip .tt-v { font-weight: 700; font-variant-numeric: tabular-nums; }

  footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 30px; }
  .foot-links { margin-top: 16px; }
  .foot-links a { color: var(--muted); }
  .feedback-btn {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--series-1); color: #06122b; text-decoration: none;
    font-size: 14px; font-weight: 600; padding: 10px 20px; border-radius: 11px;
    box-shadow: var(--shadow); transition: transform .1s, filter .1s;
  }
  html[data-theme="light"] .feedback-btn { color: #fff; }
  .feedback-btn:hover { filter: brightness(1.05); transform: translateY(-1px); }

  .demo-flag {
    display: inline-block; font-size: 11px; font-weight: 600; color: var(--warning);
    border: 1px solid var(--border); border-radius: 999px; padding: 2px 9px; margin-left: 8px; vertical-align: middle;
  }

  @media (max-width: 720px) {
    body { font-size: 14px; }
    main { padding: 14px 12px 48px; }
    .grid { grid-template-columns: 1fr; gap: 12px; }
    .greeting { margin: 4px 2px 14px; }
    .greeting h1 { font-size: 19px; }
    .greeting .date { font-size: 13px; }
    /* rings */
    .today { padding: 14px; }
    .today-rings { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .ring-wrap { width: 78px; height: 78px; }
    .ring-wrap .val { font-size: 19px; }
    .ring-label { font-size: 12px; }
    .ring-state { font-size: 11px; }
    /* cards */
    .card { padding: 14px; }
    .card-head h3 { font-size: 14px; }
    .card-head .big { font-size: 21px; }
    .card-head .ic { width: 26px; height: 26px; font-size: 14px; }
    .stats { gap: 5px 14px; }
    .stat .k { font-size: 11px; }
    .stat .v { font-size: 14px; }
    .explain { font-size: 12px; }
    .insight { font-size: 13px; }
    /* top bar */
    .brand { font-size: 15px; }
    .brand span.name { display: none; }
    .topbar-inner { gap: 6px; padding: 9px 10px; flex-wrap: wrap; }
    .seg { padding: 2px; gap: 1px; }
    .seg button { padding: 4px 7px; font-size: 12px; }
    .icon-btn { width: 30px; height: 30px; font-size: 14px; }
    .demo-flag { display: none; }
  }
</style>
</head>

  <main>

    <div class="grid" id="metricGrid"></div>

        <a href="/terms" id="footTerms">Условия</a>
      </div>
    </footer>
  </main>

  <div class="tooltip" id="tooltip"></div>

/* ---------- sample data (30 days, deterministic-ish) ---------- */
function buildSample() {
  const days = 30;
  const today = new Date();
  const mk = (base, amp, drift, noiseSeed) => {
    const arr = [];
    for (let i = days - 1; i >= 0; i--) {
      const t = (days - 1 - i);
      const wave = Math.sin((t / 6) + noiseSeed) * amp;
      const dr = drift * (t / days);
      const n = ((Math.sin(t * 12.9898 + noiseSeed * 78.233) * 43758.5453) % 1) * amp * 0.5;
      const d = new Date(today); d.setDate(today.getDate() - i);
      arr.push({ date: d, v: Math.round((base + wave + dr + n) * 10) / 10 });
    }
    return arr;
  };
  return {
    date: today,
    sleepScore: mk(78, 7, 6, 1),
    readiness:  mk(80, 6, 4, 2),
    activity:   mk(74, 9, 2, 3),
    hrv:        mk(52, 8, 5, 4),
    rhr:        mk(56, 3, -2, 5),
    temp:       mk(0.1, 0.25, 0, 6),
    stress:     mk(64, 10, -3, 7), // resilience score
    steps:      mk(8200, 2200, 600, 8),
    spo2:       mk(97, 0.7, 0, 9),
    vo2:        mk(45.5, 1.2, 1.5, 10),
    today: {
      sleep: { dur: 452, inbed: 496, eff: 91, latency: 12, deep: 78, rem: 96, light: 278, awake: 44, restful: 84, resp: 14.2, hr: 54, hrv: 54, bedtime: "23:48", waketime: "07:24" },
      readiness: { rhr: 55, hrv: 54, temp: 0.1, recovery: "solid", ri: 92, sb: 88, hb: 79 },
      activity: { steps: 8420, stepsTarget: 9000, cal: 512, totalCal: 2380, target: 500, distance: 6.1, met: 340, sedentary: 540, low: 210, medium: 62, high: 8, rest: 88 },
      hr: { rhr: 55, hrv: 52, avg: 68, max: 148 },
      temp: { dev: 0.1, trend: 0.05 },
      stress: { high: 100, rec: 190, res: "solid", day: "normal" }, // minutes
      spo2: { avg: 97.4, bdi: 1.2, resp: 14.2 },
      cardio: { age: 32, vo2: 46.5 },
    }
  };
}

/* ---------- helpers ---------- */
const $ = (s, r=document) => r.querySelector(s);
function fmtDur(min, L) {
  const h = Math.floor(min/60), m = Math.round(min%60);
  return h > 0 ? `${h}ч ${m}${L.units.min}`.replace("ч", state.lang==="ru"?"ч":"h") : `${m} ${L.units.min}`;
}
function durHM(min) { const h=Math.floor(min/60), m=Math.round(min%60); return {h,m}; }
function fmtDuration(min) {
  const {h,m} = durHM(min);
  if (state.lang === "ru") return h>0 ? `${h}ч ${m}м` : `${m}м`;
  return h>0 ? `${h}h ${String(m).padStart(2,"0")}m` : `${m}m`;
}
function tmpl(str, obj) { return str.replace(/\{(\w+)\}/g, (_,k)=> (obj[k] ?? "")); }
function scoreState(v) { return v >= 85 ? "good" : v >= 70 ? "warn" : "low"; }
function nf(n) { if (n === null || n === undefined) return "—"; return new Intl.NumberFormat(state.lang === "en" ? "en-US" : state.lang === "pt" ? "pt-PT" : "ru-RU").format(n); }

/* ---------- SVG ring gauge ---------- */
function ring(value, label, L) {
  const st = scoreState(value);
  const color = st === "good" ? "var(--good)" : st === "warn" ? "var(--warning)" : "var(--serious)";
  const stCls = st === "good" ? "st-good" : st === "warn" ? "st-warn" : "st-low";
  const stTxt = st === "good" ? L.stateGood : st === "warn" ? L.stateWarn : L.stateLow;
  const r = 46, c = 2 * Math.PI * r, off = c * (1 - value/100);
  return `<div class="ring-card">
    <div class="ring-wrap">
      <svg viewBox="0 0 108 108" width="108" height="108" aria-hidden="true">
        <circle cx="54" cy="54" r="${r}" fill="none" stroke="var(--grid)" stroke-width="9"/>
        <circle cx="54" cy="54" r="${r}" fill="none" stroke="${color}" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
          transform="rotate(-90 54 54)"/>
      </svg>
      <div class="val">${Math.round(value)}</div>
    </div>
    <div class="ring-label">${label}</div>
    <div class="ring-state ${stCls}">${stTxt}</div>
  </div>`;
}

/* ---------- SVG trend chart with hover ---------- */
let charts = []; // {el, points, series, fmt}
function trendSVG(series, opts={}) {
  const W = 300, H = 72, padY = 8;
  const data = (series||[]).slice(-state.range);
  if (data.length < 2) {
    return { svg: `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img"></svg>`, pts: [], fmt: opts.fmt || (v=>v) };
  }
  const vals = data.map(d=>d.v);
  const min = Math.min(...vals), max = Math.max(...vals);
  const span = (max - min) || 1;
  const x = i => (i/(data.length-1)) * W;
  const y = v => H - padY - ((v - min)/span) * (H - padY*2);
  let line = "", area = "";
  data.forEach((d,i)=>{ const px=x(i), py=y(d.v); line += (i? "L":"M")+px.toFixed(1)+" "+py.toFixed(1)+" "; });
  area = `M0 ${H} ` + data.map((d,i)=>`L${x(i).toFixed(1)} ${y(d.v).toFixed(1)}`).join(" ") + ` L${W} ${H} Z`;
  const gid = "g"+Math.random().toString(36).slice(2,8);
  const pts = data.map((d,i)=>({px:x(i), py:y(d.v), d}));
  const last = pts[pts.length-1];
  const svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--series-1)" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="var(--series-1)" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${line}" fill="none" stroke="var(--series-1)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${last.px.toFixed(1)}" cy="${last.py.toFixed(1)}" r="3.2" fill="var(--series-1)" stroke="var(--surface-1)" stroke-width="1.5"/>
    <line class="cx" x1="0" y1="0" x2="0" y2="${H}" stroke="var(--baseline)" stroke-width="1" vector-effect="non-scaling-stroke" style="opacity:0"/>
    <circle class="cxdot" r="4" fill="var(--series-1)" stroke="var(--surface-1)" stroke-width="1.5" style="opacity:0"/>
    <rect x="0" y="0" width="${W}" height="${H}" fill="transparent" style="cursor:crosshair"/>
  </svg>`;
  return { svg, pts, fmt: opts.fmt || (v=>v) };
}

function attachHover(container, chart) {
  const svg = container.querySelector("svg");
  if (!svg) return; // "1 day" view has no chart
  const cx = svg.querySelector(".cx"), dot = svg.querySelector(".cxdot");
  if (!cx || !dot || !chart.pts || !chart.pts.length) return;
  const tip = $("#tooltip");
  const L = I18N[state.lang];
  const locale = state.lang==="en"?"en-US":state.lang==="pt"?"pt-PT":"ru-RU";
  svg.addEventListener("pointermove", (e)=>{
    const rect = svg.getBoundingClientRect();
    const rx = (e.clientX - rect.left)/rect.width * 300;
    let nearest = chart.pts[0], nd = Infinity;
    chart.pts.forEach(p=>{ const d=Math.abs(p.px-rx); if(d<nd){nd=d;nearest=p;} });
    cx.style.opacity=1; cx.setAttribute("x1", nearest.px); cx.setAttribute("x2", nearest.px);
    dot.style.opacity=1; dot.setAttribute("cx", nearest.px); dot.setAttribute("cy", nearest.py);
    const ds = nearest.d.date.toLocaleDateString(locale, {day:"numeric", month:"short"});
    tip.innerHTML = `<div class="tt-d">${ds}</div><div class="tt-v">${chart.fmt(nearest.d.v)}</div>`;
    tip.style.opacity=1;
    tip.style.left = Math.min(e.clientX+12, window.innerWidth-90)+"px";
    tip.style.top = (e.clientY-46)+"px";
  });
  svg.addEventListener("pointerleave", ()=>{ cx.style.opacity=0; dot.style.opacity=0; tip.style.opacity=0; });
}

/* ---------- metric card ---------- */
function clean(v) {
  if (v === null || v === undefined) return "—";
  const s = String(v);
  return /\bnull\b|NaN|undefined/.test(s) ? "—" : s;
}
function card(icon, sect, series, big, bigUnit, statPairs, explainVars, fmt) {
  const L = I18N[state.lang];
  const stats = statPairs.map(([k,v])=>`<div class="stat"><div class="k">${k}</div><div class="v">${clean(v)}</div></div>`).join("");
  const cleanVars = {}; for (const k in explainVars) cleanVars[k] = clean(explainVars[k]);
  const explain = tmpl(sect.explain, cleanVars);
  big = clean(big);
  const loc = state.lang==="en"?"en-US":state.lang==="pt"?"pt-PT":"ru-RU";
  const win = (series||[]).slice(-state.range);
  const firstD = win.length ? win[0].date.toLocaleDateString(loc,{day:"numeric",month:"short"}) : "";
  const lastD = win.length ? win[win.length-1].date.toLocaleDateString(loc,{day:"numeric",month:"short"}) : "";
  const chart = trendSVG(series, {fmt});
  // "1 day" view: no trend graph (a single day has no trend) — show only today's values.
  const showTrend = state.range > 1 && win.length >= 2;
  const trendHtml = showTrend
    ? `<div class="trend">${chart.svg}<div class="trend-foot"><span>${firstD}</span><span>${lastD}</span></div></div>`
    : "";
  const html = `<div class="card">
    <div class="card-head"><div class="ic">${icon}</div><h3>${sect.title}</h3>
      <div class="big">${big}${bigUnit?`<small>${bigUnit}</small>`:""}</div></div>
    <div class="stats">${stats}</div>
    <p class="explain">${explain}</p>
    ${trendHtml}
  </div>`;
  return { html, chart, showTrend };
}

/* ============================================================
   Live data: fetch GET /api/dashboard using Telegram Login Widget
   auth params from the URL query string. Falls back to demo data
   when opened without auth (or on any error).
   ============================================================ */
const pv = (o, ...ks) => ks.reduce((a,k)=> (a==null?null:a[k]), o);
const secToMin = s => (typeof s==="number" ? Math.round(s/60) : null);
const hhmm = iso => { if(!iso) return null; const d=new Date(iso); return isNaN(d)?null:
  String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };

function toSeries(arr) {
  return (arr||[]).map(p => ({ date: new Date(p.date), v: p.v }));
}

function mapApiToState(api) {
  const s = api.series || {};
  const t = api.today || {};
  const sl = t.sleep||{}, rd = t.readiness||{}, ac = t.activity||{}, hr = t.heartrate||{},
        sp = t.spo2||{}, st = t.stress||{}, rs = t.resilience||{}, tp = t.temperature||{}, cd = t.cardio||{};
  const rc = rd.contributors||{};
  const spAvg = pv(sp,"spo2_percentage","average") ?? sp.average ?? null;
  const calToGoal = (typeof ac.target_calories==="number" && typeof ac.active_calories==="number")
    ? Math.max(0, Math.round(ac.target_calories - ac.active_calories)) : null;
  // Round like the Oura app: heart rate / HRV / scores to whole numbers, breathing to 1 decimal.
  const r0 = v => (typeof v === "number" && isFinite(v)) ? Math.round(v) : null;
  const r1 = v => (typeof v === "number" && isFinite(v)) ? Math.round(v*10)/10 : null;
  return {
    date: api.date ? new Date(api.date) : new Date(),
    observation: api.observation || null,
    sleepScore: toSeries(s.sleepScore),
    readiness:  toSeries(s.readiness),
    activity:   toSeries(s.activity),
    hrv:        toSeries(s.hrv),
    rhr:        toSeries(s.rhr),
    temp:       toSeries(s.temp),
    stress:     toSeries(s.stress),
    steps:      toSeries(s.steps),
    spo2:       toSeries(s.spo2),
    vo2:        toSeries(s.vo2),
    today: {
      sleep: {
        dur: secToMin(sl.total_sleep_duration), inbed: secToMin(sl.time_in_bed),
        eff: r0(sl.efficiency), latency: secToMin(sl.latency),
        deep: secToMin(sl.deep_sleep_duration), rem: secToMin(sl.rem_sleep_duration),
        light: secToMin(sl.light_sleep_duration), awake: secToMin(sl.awake_time),
        restful: r0(sl.restfulness), resp: r1(sl.average_breath),
        hr: r0(sl.average_heart_rate ?? sl.lowest_heart_rate), hrv: r0(sl.average_hrv),
        bedtime: hhmm(sl.bedtime_start), waketime: hhmm(sl.bedtime_end),
      },
      readiness: {
        rhr: r0(rd.resting_heart_rate ?? hr.lowest_heart_rate), hrv: r0(hr.average_hrv),
        temp: tp.deviation ?? null, recovery: levelKey(rs.level),
        ri: r0(rc.recovery_index), sb: r0(rc.sleep_balance), hb: r0(rc.hrv_balance),
      },
      activity: {
        steps: ac.steps ?? null, stepsTarget: null,
        cal: ac.active_calories ?? null, totalCal: ac.total_calories ?? null,
        target: ac.target_calories ?? null,
        distance: typeof ac.equivalent_walking_distance==="number" ? Math.round(ac.equivalent_walking_distance/100)/10 : null,
        met: ac.average_met_minutes!=null ? Math.round(ac.average_met_minutes) : null,
        sedentary: secToMin(ac.sedentary_time), low: secToMin(ac.low_activity_time),
        medium: secToMin(ac.medium_activity_time), high: secToMin(ac.high_activity_time),
        rest: calToGoal,
      },
      hr: { rhr: r0(rd.resting_heart_rate ?? hr.lowest_heart_rate), hrv: r0(hr.average_hrv),
            avg: r0(hr.average_heart_rate), max: null },
      temp: { dev: tp.deviation ?? null, trend: tp.trend ?? null },
      stress: { high: secToMin(st.stress_high), rec: secToMin(st.recovery_high),
                res: levelKey(rs.level), day: dayKey(st.day_summary) },
      spo2: { avg: r1(spAvg), bdi: r1(sp.breathing_disturbance_index), resp: r1(sl.average_breath) },
      cardio: { age: cd.cardiovascular_age ?? null, vo2: cd.vo2_max ?? null },
    },
  };
}
function levelKey(v){ const m={limited:"limited",fair:"adequate",adequate:"adequate",good:"solid",solid:"solid",strong:"strong",exceptional:"exceptional"};
  return v && m[String(v).toLowerCase()] ? m[String(v).toLowerCase()] : "solid"; }
function dayKey(v){ const m={stressful:"stressful",restored:"restored",normal:"normal",relaxed:"relaxed"};
  return v && m[String(v).toLowerCase()] ? m[String(v).toLowerCase()] : "normal"; }

async function fetchDashboard(paramsObj) {
  const qs = new URLSearchParams(paramsObj).toString();
  const res = await fetch("/api/dashboard?" + qs, { headers: { "Accept": "application/json" } });
  if (!res.ok) throw new Error("auth " + res.status);
  const api = await res.json();
  if (!api.today || !(api.series && api.series.sleepScore && api.series.sleepScore.length)) throw new Error("no data");
  SAMPLE = mapApiToState(api);
  IS_DEMO = false;
  if (api.language && I18N[api.language]) {
    state.lang = api.language;
    [...$("#langSeg").children].forEach(x=>x.setAttribute("aria-pressed", x.dataset.lang===api.language));
  }
  render();
}

// Remember the login so the user doesn't re-auth every visit.
const AUTH_KEY = "otracker_auth";
function saveAuth(u) { try { localStorage.setItem(AUTH_KEY, JSON.stringify(u)); } catch (e) {} }
function loadAuth() { try { const s = localStorage.getItem(AUTH_KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; } }
function clearAuth() { try { localStorage.removeItem(AUTH_KEY); } catch (e) {} }

// Telegram Login Widget callback (must be global).
window.onTelegramAuth = async (user) => {
  try {
    await fetchDashboard(user);
    saveAuth(user); // stay logged in on future visits
  } catch (e) {
    console.warn("[dashboard] login fetch failed:", e.message);
    const L = I18N[state.lang];
    alert(L.loginError || "Не удалось загрузить данные. Убедитесь, что вы подключили Oura в боте.");
  }
};

const TG_BOT = "O_trackerbot"; // Telegram bot username (without @)
function mountTelegramLogin() {
  const c = $("#tgLoginBtn");
  if (!c || c.dataset.mounted) return;
  c.dataset.mounted = "1";
  const s = document.createElement("script");
  s.async = true;
  s.src = "https://telegram.org/js/telegram-widget.js?22";
  s.setAttribute("data-telegram-login", TG_BOT);
  s.setAttribute("data-size", "medium");
  s.setAttribute("data-userpic", "false");
  s.setAttribute("data-onauth", "onTelegramAuth(user)");
  s.setAttribute("data-request-access", "write");
  c.appendChild(s);
}

async function loadData() {
  const params = new URLSearchParams(window.location.search);
  let auth = null;
  if (params.get("id") && params.get("hash")) {
    auth = {};
    params.forEach((v, k) => (auth[k] = v));
  } else {
    auth = loadAuth(); // remembered from a previous login
  }
  if (auth && auth.id && auth.hash) {
    try {
      await fetchDashboard(auth);
      saveAuth(auth);
      return;
    } catch (e) {
      console.warn("[dashboard] auth failed:", e.message);
      clearAuth(); // stored login expired/invalid → show login again
    }
  }
  // Not logged in → show demo + Telegram login button.
  IS_DEMO = true;
  render();
  mountTelegramLogin();
}

loadData();
</script>
